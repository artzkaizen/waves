name: build & publish image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}

jobs:
  # Gate the image on the tests: a red build must never become a deployable tag.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc -b

      - name: Lint
        run: bun run lint

      - name: API end-to-end tests
        run: bun test

  publish:
    needs: test
    runs-on: ubuntu-latest
    # Nothing to publish for a PR — it only needs to prove it builds and passes.
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=long

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # amd64 only: the deploy target is an x86 server. Adding arm64 here would
          # roughly double build time for an image nothing pulls.
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Coolify watches the registry (or its own webhook) and redeploys on a new :latest.
      # If you enabled a deploy webhook on the Coolify resource, set COOLIFY_WEBHOOK as a
      # repo secret and this nudges it immediately instead of waiting for a poll.
      - name: Trigger Coolify deploy
        if: ${{ github.ref == 'refs/heads/main' && env.COOLIFY_WEBHOOK != '' }}
        env:
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
        run: curl -fsSL -X POST "$COOLIFY_WEBHOOK"
