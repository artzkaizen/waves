# waves · self-hosted deployment (Coolify / plain Docker).
#
# Coolify terminates TLS and reverse-proxies to this container, so the app itself speaks
# plain HTTP on 8000 and does not manage certificates.
#
# Required environment (set these as secrets in Coolify, not in this file):
#   WAVES_INGEST_TOKEN   the shared secret the Pi presents on /ingest.
#                        Generate with: openssl rand -hex 32
#                        The server REFUSES TO BOOT in production without it.

services:
  waves:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped

    environment:
      NODE_ENV: production
      PORT: "8000"
      WAVES_DATA_DIR: /data
      # No `:?` guard: under otterdeploy the value is injected as container env, and the
      # `:?` form makes `docker compose` hard-fail at parse time when the var isn't in the
      # interpolation environment — which stops the container from ever starting.
      WAVES_INGEST_TOKEN: ${WAVES_INGEST_TOKEN}

    volumes:
      # The SQLite database and every recorded WAV/video live here. This is the only
      # stateful thing in the system — lose it and you lose the recordings.
      - waves-data:/data

    # NOTE: no host `ports:` mapping. Under otterdeploy (and other managed ingress) the
    # platform routes the public domain to the container's port 8000 over its own network
    # via `--expose`; publishing 8000 on the host on top of that conflicts with the shared
    # host port and prevents the container from starting. For plain `docker compose up`,
    # add back `ports: ["8000:8000"]` (or run behind your own reverse proxy).

    healthcheck:
      test: ["CMD", "bun", "-e", "await fetch('http://localhost:8000/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

    # SQLite + on-disk media mean this must stay a single instance. Do not scale it.
    deploy:
      replicas: 1

volumes:
  waves-data:
